<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zapsell — Leads</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<div class="app">
  <main class="main" id="main" style="display:none">
    <div class="page-header">
      <h1 class="page-title">Leads</h1>
      <p class="page-subtitle">Gerencie seus contatos e oportunidades.</p>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="busca" placeholder="Buscar por nome ou telefone..." oninput="filtrar()"/>
      </div>
      <select class="filter-select" id="filtro-status" onchange="filtrar()">
        <option value="">Todos os status</option>
        <option value="novo">Novo</option>
        <option value="em_contato">Em contato</option>
        <option value="convertido">Convertido</option>
        <option value="perdido">Perdido</option>
      </select>
      <button class="btn btn-primary" onclick="abrirModal('modal-novo')">+ Novo lead</button>
    </div>

    <!-- Contadores rápidos -->
    <div id="contadores" style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Telefone</th>
            <th>E-mail</th>
            <th>Origem</th>
            <th>Status</th>
            <th>Cadastro</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tabela">
          <tr class="loading-row"><td colspan="7"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Modal: novo lead -->
<div class="modal-overlay" id="modal-novo">
  <div class="modal">
    <div class="modal-title">Novo Lead</div>
    <div class="form-group">
      <label>Nome *</label>
      <input id="n-nome" placeholder="João Silva"/>
    </div>
    <div class="form-group">
      <label>Telefone</label>
      <input id="n-tel" placeholder="(41) 99999-0000" type="tel"/>
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <input id="n-email" placeholder="joao@email.com" type="email"/>
    </div>
    <div class="form-group">
      <label>Origem</label>
      <select id="n-origem">
        <option value="manual">Manual</option>
        <option value="whatsapp">WhatsApp</option>
        <option value="instagram">Instagram</option>
        <option value="site">Site</option>
        <option value="indicacao">Indicação</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notas</label>
      <textarea id="n-notas" rows="3" placeholder="Observações..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="fecharModal('modal-novo')">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar-lead" onclick="salvarLead()">Salvar lead</button>
    </div>
  </div>
</div>

<!-- Modal: editar lead -->
<div class="modal-overlay" id="modal-editar">
  <div class="modal">
    <div class="modal-title">Editar Lead</div>
    <input type="hidden" id="e-id"/>
    <div class="form-group">
      <label>Nome *</label>
      <input id="e-nome"/>
    </div>
    <div class="form-group">
      <label>Telefone</label>
      <input id="e-tel" type="tel"/>
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <input id="e-email" type="email"/>
    </div>
    <div class="form-group">
      <label>Origem</label>
      <select id="e-origem">
        <option value="manual">Manual</option>
        <option value="whatsapp">WhatsApp</option>
        <option value="instagram">Instagram</option>
        <option value="site">Site</option>
        <option value="indicacao">Indicação</option>
      </select>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="e-status">
        <option value="novo">Novo</option>
        <option value="em_contato">Em contato</option>
        <option value="convertido">Convertido</option>
        <option value="perdido">Perdido</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notas</label>
      <textarea id="e-notas" rows="3"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="confirmarExcluir()">Excluir</button>
      <button class="btn btn-ghost" onclick="fecharModal('modal-editar')">Cancelar</button>
      <button class="btn btn-primary" id="btn-atualizar-lead" onclick="atualizarLead()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: confirmar exclusão -->
<div class="modal-overlay" id="modal-confirm">
  <div class="modal" style="max-width:360px;text-align:center">
    <div style="font-size:36px;margin-bottom:12px">🗑️</div>
    <div class="modal-title" style="justify-content:center">Excluir lead?</div>
    <p style="color:var(--muted);font-size:13.5px;margin-bottom:20px">Essa ação não pode ser desfeita.</p>
    <div class="modal-actions" style="justify-content:center">
      <button class="btn btn-ghost" onclick="fecharModal('modal-confirm')">Cancelar</button>
      <button class="btn btn-danger" onclick="executarExclusao()">Sim, excluir</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/leads.js"></script>

<script>
  renderSidebar('leads')

  const origemIcon = { whatsapp:'📱', instagram:'📸', site:'🌐', indicacao:'🤝', manual:'✏️' }

  let todosLeads = []

  async function init() {
    const user = await protegerPagina()
    if (!user) return
    await carregarSidebar()
    document.getElementById('main').style.display = ''
    await carregarLeads()
  }

  async function carregarLeads() {
    try {
      const { data, error } = await _sb
        .from('leads').select('*').order('created_at', { ascending: false })
      if (error) throw error
      todosLeads = data || []
      atualizarContadores()
      filtrar()
    } catch(e) {
      toast('Erro ao carregar leads: ' + e.message, 'error')
    }
  }

  function atualizarContadores() {
    const counts = todosLeads.reduce((a, l) => { a[l.status] = (a[l.status]||0)+1; return a }, {})
    const items = [
      { status:'novo',        label:'Novos',       cor:'var(--blue)' },
      { status:'em_contato',  label:'Em contato',  cor:'var(--yellow)' },
      { status:'convertido',  label:'Convertidos', cor:'var(--green)' },
      { status:'perdido',     label:'Perdidos',    cor:'var(--red)' },
    ]
    document.getElementById('contadores').innerHTML = items.map(i => `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12.5px;display:flex;align-items:center;gap:6px;cursor:pointer"
           onclick="setFiltroStatus('${i.status}')">
        <span style="width:7px;height:7px;border-radius:50%;background:${i.cor};flex-shrink:0"></span>
        <strong>${counts[i.status]||0}</strong> ${i.label}
      </div>`).join('')
  }

  function setFiltroStatus(status) {
    const sel = document.getElementById('filtro-status')
    sel.value = sel.value === status ? '' : status
    filtrar()
  }

  function filtrar() {
    const busca  = document.getElementById('busca').value.toLowerCase()
    const status = document.getElementById('filtro-status').value
    const filtrado = todosLeads.filter(l => {
      const ok_busca  = l.nome.toLowerCase().includes(busca) || (l.telefone||'').includes(busca)
      const ok_status = !status || l.status === status
      return ok_busca && ok_status
    })
    renderTabela(filtrado)
  }

  function renderTabela(leads) {
    const tb = document.getElementById('tabela')
    if (!leads.length) {
      tb.innerHTML = `<tr><td colspan="7">
        <div class="empty"><div class="empty-icon">🎯</div>
        <div class="empty-text">Nenhum lead encontrado.</div></div></td></tr>`
      return
    }
    tb.innerHTML = leads.map(l => `
      <tr>
        <td><strong>${l.nome}</strong>${l.notas ? `<div style="font-size:11.5px;color:var(--muted);margin-top:2px">${l.notas.slice(0,50)}${l.notas.length>50?'…':''}</div>` : ''}</td>
        <td>${l.telefone
          ? `<a href="https://wa.me/55${l.telefone.replace(/\D/g,'')}" target="_blank"
               style="color:var(--green);text-decoration:none;display:flex;align-items:center;gap:4px;font-size:13px">
               <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--green)"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
               ${l.telefone}</a>`
          : '—'}</td>
        <td style="color:var(--muted);font-size:12.5px">${l.email || '—'}</td>
        <td><span style="font-size:12px">${origemIcon[l.origem]||'•'} ${l.origem}</span></td>
        <td>${badgeStatus(l.status)}</td>
        <td style="color:var(--muted);font-size:12px">${formatarData(l.created_at)}</td>
        <td>
          <button class="btn btn-ghost btn-sm" onclick='abrirEditar(${JSON.stringify(l).replace(/'/g,"&#39;")})'>Editar</button>
        </td>
      </tr>`).join('')
  }

  async function salvarLead() {
    const nome = document.getElementById('n-nome').value.trim()
    if (!nome) return toast('Informe o nome do lead.', 'error')
    setLoading('btn-salvar-lead', true)
    try {
      const { data: { user } } = await _sb.auth.getUser()
      const { error } = await _sb.from('leads').insert({
        user_id:  user.id,
        nome,
        telefone: document.getElementById('n-tel').value.trim(),
        email:    document.getElementById('n-email').value.trim(),
        origem:   document.getElementById('n-origem').value,
        notas:    document.getElementById('n-notas').value.trim(),
        status:   'novo',
      })
      if (error) throw error
      toast('Lead salvo com sucesso!')
      fecharModal('modal-novo')
      ;['n-nome','n-tel','n-email','n-notas'].forEach(id => document.getElementById(id).value = '')
      document.getElementById('n-origem').value = 'manual'
      await carregarLeads()
    } catch(e) {
      toast('Erro ao salvar: ' + e.message, 'error')
    } finally {
      setLoading('btn-salvar-lead', false, 'Salvar lead')
    }
  }

  function abrirEditar(l) {
    document.getElementById('e-id').value      = l.id
    document.getElementById('e-nome').value    = l.nome
    document.getElementById('e-tel').value     = l.telefone || ''
    document.getElementById('e-email').value   = l.email || ''
    document.getElementById('e-origem').value  = l.origem || 'manual'
    document.getElementById('e-status').value  = l.status
    document.getElementById('e-notas').value   = l.notas || ''
    abrirModal('modal-editar')
  }

  async function atualizarLead() {
    const nome = document.getElementById('e-nome').value.trim()
    if (!nome) return toast('Informe o nome.', 'error')
    setLoading('btn-atualizar-lead', true)
    try {
      const id = document.getElementById('e-id').value
      const { error } = await _sb.from('leads').update({
        nome,
        telefone:   document.getElementById('e-tel').value.trim(),
        email:      document.getElementById('e-email').value.trim(),
        origem:     document.getElementById('e-origem').value,
        status:     document.getElementById('e-status').value,
        notas:      document.getElementById('e-notas').value.trim(),
        updated_at: new Date().toISOString(),
      }).eq('id', id)
      if (error) throw error
      toast('Lead atualizado!')
      fecharModal('modal-editar')
      await carregarLeads()
    } catch(e) {
      toast('Erro ao atualizar: ' + e.message, 'error')
    } finally {
      setLoading('btn-atualizar-lead', false, 'Salvar')
    }
  }

  function confirmarExcluir() {
    fecharModal('modal-editar')
    setTimeout(() => abrirModal('modal-confirm'), 200)
  }

  async function executarExclusao() {
    const id = document.getElementById('e-id').value
    try {
      const { error } = await _sb.from('leads').delete().eq('id', id)
      if (error) throw error
      toast('Lead excluído.')
      fecharModal('modal-confirm')
      await carregarLeads()
    } catch(e) {
      toast('Erro ao excluir: ' + e.message, 'error')
    }
  }

  init()
</script>
</body>
</html>
