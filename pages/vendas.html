<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zapsell — Vendas</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<div class="app">
  <main class="main" id="main" style="display:none">
    <div class="page-header">
      <h1 class="page-title">Vendas</h1>
      <p class="page-subtitle">Controle suas receitas e pagamentos.</p>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-dot" style="background:var(--green)"></div>
        <div class="card-label">Total Pago</div>
        <div class="card-value" id="v-pago">—</div>
        <div class="card-sub" id="v-pago-count">0 vendas</div>
      </div>
      <div class="card">
        <div class="card-dot" style="background:var(--yellow)"></div>
        <div class="card-label">Pendente</div>
        <div class="card-value" id="v-pendente">—</div>
        <div class="card-sub" id="v-pendente-count">0 vendas</div>
      </div>
      <div class="card">
        <div class="card-dot" style="background:var(--blue)"></div>
        <div class="card-label">Total Geral</div>
        <div class="card-value" id="v-total">—</div>
        <div class="card-sub" id="v-total-count">0 vendas</div>
      </div>
    </div>

    <div class="toolbar">
      <select class="filter-select" id="filtro" onchange="filtrar()">
        <option value="">Todos</option>
        <option value="pendente">Pendente</option>
        <option value="pago">Pago</option>
        <option value="cancelado">Cancelado</option>
      </select>
      <button class="btn btn-primary" onclick="abrirModal('modal-venda')">+ Nova venda</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Descrição</th>
            <th>Lead</th>
            <th>Valor</th>
            <th>Status</th>
            <th>Data</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tabela">
          <tr class="loading-row"><td colspan="6"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Modal nova venda -->
<div class="modal-overlay" id="modal-venda">
  <div class="modal">
    <div class="modal-title">Nova Venda</div>
    <div class="form-group">
      <label>Descrição *</label>
      <input id="v-desc" placeholder="Ex: Plano mensal, Produto X..."/>
    </div>
    <div class="form-group">
      <label>Valor (R$) *</label>
      <input id="v-valor" type="number" min="0" step="0.01" placeholder="0.00"/>
    </div>
    <div class="form-group">
      <label>Lead vinculado</label>
      <select id="v-lead">
        <option value="">— sem vínculo —</option>
      </select>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="v-status">
        <option value="pendente">Pendente</option>
        <option value="pago">Pago</option>
        <option value="cancelado">Cancelado</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="fecharModal('modal-venda')">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar-venda" onclick="salvarVenda()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal editar venda -->
<div class="modal-overlay" id="modal-editar">
  <div class="modal">
    <div class="modal-title">Editar Venda</div>
    <input type="hidden" id="e-id"/>
    <div class="form-group">
      <label>Descrição</label>
      <input id="e-desc"/>
    </div>
    <div class="form-group">
      <label>Valor (R$)</label>
      <input id="e-valor" type="number" min="0" step="0.01"/>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="e-status">
        <option value="pendente">Pendente</option>
        <option value="pago">Pago</option>
        <option value="cancelado">Cancelado</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="confirmarExcluir()">Excluir</button>
      <button class="btn btn-ghost" onclick="fecharModal('modal-editar')">Cancelar</button>
      <button class="btn btn-primary" id="btn-atualizar-venda" onclick="atualizarVenda()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal confirmar exclusão -->
<div class="modal-overlay" id="modal-confirm">
  <div class="modal" style="max-width:360px;text-align:center">
    <div style="font-size:36px;margin-bottom:12px">💸</div>
    <div class="modal-title" style="justify-content:center">Excluir venda?</div>
    <p style="color:var(--muted);font-size:13.5px;margin-bottom:20px">Essa ação não pode ser desfeita.</p>
    <div class="modal-actions" style="justify-content:center">
      <button class="btn btn-ghost" onclick="fecharModal('modal-confirm')">Cancelar</button>
      <button class="btn btn-danger" onclick="executarExclusao()">Sim, excluir</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/vendas-config.js"></script>

<script>
  renderSidebar('vendas')
  let todasVendas = []

  async function init() {
    const user = await protegerPagina()
    if (!user) return
    await carregarSidebar()
    document.getElementById('main').style.display = ''

    // Popula select de leads
    try {
      const { data: leads } = await _sb.from('leads').select('id, nome').order('nome')
      if (leads) {
        const sel = document.getElementById('v-lead')
        leads.forEach(l => sel.insertAdjacentHTML('beforeend',
          `<option value="${l.id}">${l.nome}</option>`))
      }
    } catch(e) { /* ok se não tiver leads */ }

    await carregarVendas()
  }

  async function carregarVendas() {
    try {
      const { data, error } = await _sb.from('vendas')
        .select('*, leads(nome, telefone)')
        .order('created_at', { ascending: false })
      if (error) throw error
      todasVendas = data || []
      atualizarCards()
      filtrar()
    } catch(e) {
      toast('Erro ao carregar vendas: ' + e.message, 'error')
    }
  }

  function atualizarCards() {
    const pagas     = todasVendas.filter(v => v.status === 'pago')
    const pendentes = todasVendas.filter(v => v.status === 'pendente')
    const soma = arr => arr.reduce((s, v) => s + Number(v.valor), 0)

    document.getElementById('v-pago').textContent         = formatarMoeda(soma(pagas))
    document.getElementById('v-pago-count').textContent   = `${pagas.length} venda${pagas.length!==1?'s':''}`
    document.getElementById('v-pendente').textContent     = formatarMoeda(soma(pendentes))
    document.getElementById('v-pendente-count').textContent = `${pendentes.length} venda${pendentes.length!==1?'s':''}`
    document.getElementById('v-total').textContent        = formatarMoeda(soma(todasVendas))
    document.getElementById('v-total-count').textContent  = `${todasVendas.length} no total`
  }

  function filtrar() {
    const f = document.getElementById('filtro').value
    const lista = f ? todasVendas.filter(v => v.status === f) : todasVendas
    renderTabela(lista)
  }

  function renderTabela(vendas) {
    const tb = document.getElementById('tabela')
    if (!vendas.length) {
      tb.innerHTML = `<tr><td colspan="6">
        <div class="empty"><div class="empty-icon">💰</div>
        <div class="empty-text">Nenhuma venda registrada.</div></div></td></tr>`
      return
    }
    tb.innerHTML = vendas.map(v => `
      <tr>
        <td><strong>${v.descricao || '—'}</strong></td>
        <td style="font-size:12.5px;color:var(--muted)">${v.leads?.nome || '—'}</td>
        <td><strong style="color:${v.status==='pago'?'var(--green)':v.status==='cancelado'?'var(--red)':'inherit'}">${formatarMoeda(v.valor)}</strong></td>
        <td>${badgeStatus(v.status)}</td>
        <td style="color:var(--muted);font-size:12px">${formatarData(v.created_at)}</td>
        <td><button class="btn btn-ghost btn-sm" onclick='abrirEditar(${JSON.stringify(v).replace(/'/g,"&#39;")})'>Editar</button></td>
      </tr>`).join('')
  }

  async function salvarVenda() {
    const desc  = document.getElementById('v-desc').value.trim()
    const valor = document.getElementById('v-valor').value
    if (!desc)  return toast('Informe a descrição.', 'error')
    if (!valor || Number(valor) <= 0) return toast('Informe um valor válido.', 'error')
    setLoading('btn-salvar-venda', true)
    try {
      const { data: { user } } = await _sb.auth.getUser()
      const lead_id = document.getElementById('v-lead').value || null
      const { error } = await _sb.from('vendas').insert({
        user_id: user.id,
        descricao: desc,
        valor: Number(valor),
        lead_id,
        status: document.getElementById('v-status').value,
      })
      if (error) throw error
      toast('Venda registrada!')
      fecharModal('modal-venda')
      document.getElementById('v-desc').value  = ''
      document.getElementById('v-valor').value = ''
      document.getElementById('v-lead').value  = ''
      document.getElementById('v-status').value = 'pendente'
      await carregarVendas()
    } catch(e) {
      toast('Erro: ' + e.message, 'error')
    } finally {
      setLoading('btn-salvar-venda', false, 'Salvar')
    }
  }

  function abrirEditar(v) {
    document.getElementById('e-id').value     = v.id
    document.getElementById('e-desc').value   = v.descricao || ''
    document.getElementById('e-valor').value  = v.valor
    document.getElementById('e-status').value = v.status
    abrirModal('modal-editar')
  }

  async function atualizarVenda() {
    const id    = document.getElementById('e-id').value
    const desc  = document.getElementById('e-desc').value.trim()
    const valor = document.getElementById('e-valor').value
    if (!desc) return toast('Informe a descrição.', 'error')
    setLoading('btn-atualizar-venda', true)
    try {
      const { error } = await _sb.from('vendas').update({
        descricao:  desc,
        valor:      Number(valor),
        status:     document.getElementById('e-status').value,
        updated_at: new Date().toISOString(),
      }).eq('id', id)
      if (error) throw error
      toast('Venda atualizada!')
      fecharModal('modal-editar')
      await carregarVendas()
    } catch(e) {
      toast('Erro ao atualizar: ' + e.message, 'error')
    } finally {
      setLoading('btn-atualizar-venda', false, 'Salvar')
    }
  }

  function confirmarExcluir() {
    fecharModal('modal-editar')
    setTimeout(() => abrirModal('modal-confirm'), 200)
  }

  async function executarExclusao() {
    const id = document.getElementById('e-id').value
    try {
      const { error } = await _sb.from('vendas').delete().eq('id', id)
      if (error) throw error
      toast('Venda excluída.')
      fecharModal('modal-confirm')
      await carregarVendas()
    } catch(e) {
      toast('Erro ao excluir: ' + e.message, 'error')
    }
  }

  init()
</script>
</body>
</html>
